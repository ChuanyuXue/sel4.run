<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>sel4.run</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.min.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body {
    height: 100%;
    margin: 0;
    background: #16161e;
    color: #c0caf5;
    font-family: system-ui, sans-serif;
  }
  body { display: flex; flex-direction: column; }
  header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background: #1a1b26;
    border-bottom: 1px solid #2a2c3d;
  }
  .brand { font-weight: 600; margin-right: 8px; }
  select, button {
    background: #24283b;
    color: #c0caf5;
    border: 1px solid #3b4261;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 13px;
  }
  button:not(:disabled) { cursor: pointer; }
  button:disabled { opacity: 0.4; }
  button:not(:disabled):hover { background: #2f334d; }
  #run:not(:disabled) { background: #315136; border-color: #4d7c57; }
  #github {
    background: #24283b;
    color: #c0caf5;
    border: 1px solid #3b4261;
    border-radius: 4px;
    padding: 4px 10px;
    font-size: 13px;
    text-decoration: none;
  }
  #github:hover { background: #2f334d; }
  #status { margin-left: auto; font-size: 12px; color: #7a83a8; }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    min-height: 0;
  }
  #editor {
    overflow: auto;
    border-right: 1px solid #2a2c3d;
    font-size: 13px;
  }
  #editor .cm-editor { height: 100%; }
  #terminal { height: 100%; padding: 4px; min-width: 0; min-height: 0; overflow: hidden; }

  /* phones: stack the panes -- code on top, terminal below */
  @media (max-width: 768px) {
    header { flex-wrap: wrap; }
    main {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr 1fr;
    }
    #editor {
      border-right: none;
      border-bottom: 1px solid #2a2c3d;
      min-height: 0;
    }
  }
</style>
</head>
<body>
<header>
  <span class="brand">sel4.run</span>
  <select id="example"></select>
  <button id="run" disabled>Run</button>
  <button id="stop" disabled>Stop</button>
  <button id="reset" disabled>Reset</button>
  <a id="github" href="https://github.com/ChuanyuXue/sel4.run" target="_blank">GitHub</a>
  <span id="status">loading…</span>
</header>
<main>
  <div id="editor"></div>
  <div id="terminal"></div>
</main>
<script type="module" src="app.js"></script>
</body>
</html>
